<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>

body {
  margin: 0;
  background: #fff;
  font-family: Arial, sans-serif;
}

.page {
  width: 1000px;
}

/* ===== TARJETAS ===== */
.front, .back {
  position: relative;
  width: 1000px;
  height: 630px;
}

/* ===== BASE ===== */
.base {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* ===== FOTO ===== */
.foto {
  position: absolute;
  top: 190px;
  left: 95px;
  width: 200px;
  height: 255px;
  object-fit: cover;
}

/* ===== FOTO MINI ===== */
.foto-mini {
  position: absolute;
  top: 155px;
  left: 820px;
  width: 100px;
  height: 120px;
  object-fit: cover;
}

/* ===== FIRMA ===== */
.firma {
  position: absolute;
  top: 455px;
  left: 330px;
  width: 230px;
  height: 55px;
  object-fit: contain;
}

/* ===== TEXTO BASE ===== */
.text {
  position: absolute;
  color: #000;
  font-family: Arial, Helvetica, sans-serif;
}

/* ===== NOMBRE ===== */
.paterno {
  top: 210px;
  left: 320px;
  font-size: 17px;
  font-weight: bold;
}

.materno {
  top: 240px;
  left: 320px;
  font-size: 17px;
  font-weight: bold;
}

.nombre {
  top: 270px;
  left: 320px;
  font-size: 17px;
  font-weight: bold;
}

/* ===== DATOS ===== */
.domicilio {
  top: 305px;
  left: 320px;
  width: 420px;
  font-size: 13px;
  line-height: 15px;
}

.curp {
  top: 440px;
  left: 320px;
  font-size: 15px;
  letter-spacing: 2px;
}

.clave {
  top: 470px;
  left: 320px;
  font-size: 15px;
}

/* ===== DERECHA ===== */
.sexo {
  top: 210px;
  left: 780px;
  font-size: 16px;
}

.registro {
  top: 210px;
  left: 550px;
  font-size: 13px;
}

.seccion {
  top: 240px;
  left: 550px;
  font-size: 13px;
}

.vigencia {
  top: 270px;
  left: 550px;
  font-size: 13px;
}

.estado {
  top: 500px;
  left: 320px;
  font-size: 13px;
}

/* ===== BACK ===== */

.qr1 {
  position: absolute;
  top: 200px;
  left: 120px;
  width: 130px;
}

.qr2 {
  position: absolute;
  top: 200px;
  left: 300px;
  width: 130px;
}

.qr3 {
  position: absolute;
  top: 200px;
  left: 480px;
  width: 130px;
}

.barcode {
  position: absolute;
  bottom: 90px;
  left: 200px;
  width: 580px;
}

.mrz {
  position: absolute;
  bottom: 30px;
  left: 180px;
  font-family: monospace;
  font-size: 14px;
  letter-spacing: 2px;
}

</style>
</head>

<body>

<div class="page">

<div class="front">
  <img src="front.png" class="base">

  <img src="{{foto}}" class="foto">
  <img src="{{fotoMini}}" class="foto-mini">
  <img src="{{firma}}" class="firma">
<div class="text paterno">{{paterno}}</div>
<div class="text materno">{{materno}}</div>
<div class="text nombre">{{nombre}}</div>

<div class="text domicilio">{{domicilio}}</div>

<div class="text curp">{{curp}}</div>
<div class="text clave">{{clave}}</div>

<div class="text sexo">{{sexo}}</div>
<div class="text estado">{{estado}}</div>

<div class="text registro">{{registro}}</div>
<div class="text seccion">{{seccion}}</div>
<div class="text vigencia">{{vigencia}}</div>
</div>

<div class="back">
  <img src="back.png" class="base">

  <img src="{{barcode}}" class="barcode">

  <div class="mrz">{{mrz}}</div>
</div>

</div>

</body>
</html>
