<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
}

.front, .back {
  position: relative;
  width: 1000px;
  height: 630px;
}

/* ===== IMAGEN BASE ===== */
.base {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* ===== FOTO PRINCIPAL ===== */
.foto {
  position: absolute;
  top: 185px;
  left: 90px;
  width: 210px;
  height: 260px;
  object-fit: cover;
  border-radius: 8px;
}

/* ===== FOTO MINI ===== */
.foto-mini {
  position: absolute;
  top: 150px;
  left: 825px;
  width: 105px;
  height: 125px;
  object-fit: cover;
}

/* ===== FIRMA ===== */
.firma {
  position: absolute;
  top: 460px;
  left: 330px;
  width: 240px;
  height: 60px;
  object-fit: contain;
}

/* ===== TEXTOS ===== */
.text {
  position: absolute;
  color: #000;
}

/* NOMBRE (orden INE real) */
.paterno {
  top: 205px;
  left: 320px;
  font-size: 18px;
  font-weight: bold;
}

.materno {
  top: 235px;
  left: 320px;
  font-size: 18px;
  font-weight: bold;
}

.nombre {
  top: 265px;
  left: 320px;
  font-size: 18px;
  font-weight: bold;
}

/* DATOS */
.domicilio {
  top: 305px;
  left: 320px;
  font-size: 14px;
  width: 420px;
}

.curp {
  top: 445px;
  left: 320px;
  font-size: 16px;
  letter-spacing: 2px;
}

.clave {
  top: 475px;
  left: 320px;
  font-size: 16px;
}

.sexo {
  top: 205px;
  left: 800px;
  font-size: 18px;
}

.estado {
  top: 505px;
  left: 320px;
  font-size: 14px;
}

/* DERECHA */
.registro {
  top: 205px;
  left: 560px;
  font-size: 14px;
}

.seccion {
  top: 235px;
  left: 560px;
  font-size: 14px;
}

.vigencia {
  top: 265px;
  left: 560px;
  font-size: 14px;
}

/* ===== REVERSO ===== */

.qr1 {
  position: absolute;
  top: 200px;
  left: 120px;
  width: 140px;
}

.qr2 {
  position: absolute;
  top: 200px;
  left: 320px;
  width: 140px;
}

.qr3 {
  position: absolute;
  top: 200px;
  left: 520px;
  width: 140px;
}

.barcode {
  position: absolute;
  bottom: 85px;
  left: 180px;
  width: 600px;
}

.mrz {
  position: absolute;
  bottom: 30px;
  left: 180px;
  font-family: monospace;
  font-size: 16px;
  letter-spacing: 3px;
}

</style>
</head>

<body>

<div class="page">

<div class="front">
  <img src="front.png" class="base">

  <img src="{{foto}}" class="foto">
  <img src="{{fotoMini}}" class="foto-mini">
  <img src="{{firma}}" class="firma">
<div class="text paterno">{{paterno}}</div>
<div class="text materno">{{materno}}</div>
<div class="text nombre">{{nombre}}</div>

<div class="text domicilio">{{domicilio}}</div>

<div class="text curp">{{curp}}</div>
<div class="text clave">{{clave}}</div>

<div class="text sexo">{{sexo}}</div>
<div class="text estado">{{estado}}</div>

<div class="text registro">{{registro}}</div>
<div class="text seccion">{{seccion}}</div>
<div class="text vigencia">{{vigencia}}</div>
</div>

<div class="back">
  <img src="back.png" class="base">

  <img src="{{qr}}" class="qr1">
  <img src="{{qr}}" class="qr2">
  <img src="{{qr}}" class="qr3">

  <img src="{{barcode}}" class="barcode">

  <div class="mrz">{{mrz}}</div>
</div>

</div>

</body>
</html>
