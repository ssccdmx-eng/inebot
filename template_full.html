<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
}
.page { width: 1000px; }

.front, .back {
  position: relative;
  width: 1000px;
  height: 630px;
}

.back { margin-top: 40px; }

.base {
  position: absolute;
  width: 100%;
  height: 100%;
}

.foto {
  position: absolute;
  top: 190px;
  left: 85px;
  width: 210px;
  height: 260px;
  object-fit: cover;
  border-radius: 10px;
}
.foto-mini {
  position: absolute;
  top: 150px;
  left: 820px;
  width: 110px;
  height: 130px;
}

.firma {
  position: absolute;
  top: 470px;
  left: 340px;
  width: 220px;
}

.text { position:absolute; }

.nombre {
  top: 235px;
  left: 300px;
  font-size: 18px;
  font-weight: bold;
}

.paterno {
  top: 205px;
  left: 300px;
  font-size: 18px;
  font-weight: bold;
}

.materno {
  top: 265px;
  left: 300px;
  font-size: 18px;
  font-weight: bold;
}

.curp {
  top: 440px;
  left: 300px;
  font-size: 16px;
  letter-spacing: 2px;
}

.clave {
  top: 470px;
  left: 300px;
  font-size: 16px;
}

.sexo { top:210px; left:780px; }
.estado { top:510px; left:320px; }

.registro { top:210px; left:560px; }
.seccion { top:240px; left:560px; }
.vigencia { top:270px; left:560px; }

.qr1 { position:absolute; top:200px; left:100px; width:150px; }
.qr2 { position:absolute; top:200px; left:300px; width:150px; }
.qr3 { position:absolute; top:200px; left:500px; width:150px; }

.barcode {
  position:absolute;
  bottom:80px;
  left:200px;
  width:500px;
}

.mrz {
  position:absolute;
  bottom:30px;
  left:200px;
  font-family: monospace;
}

</style>
</head>

<body>

<div class="page">

<div class="front">
  <img src="front.png" class="base">

  <img src="{{foto}}" class="foto">
  <img src="{{fotoMini}}" class="foto-mini">
  <img src="{{firma}}" class="firma">

  <div class="text nombre">{{nombre}}</div>
  <div class="text paterno">{{paterno}}</div>
  <div class="text materno">{{materno}}</div>

  <div class="text curp">{{curp}}</div>
  <div class="text clave">{{clave}}</div>

  <div class="text sexo">{{sexo}}</div>
  <div class="text estado">{{estado}}</div>

  <div class="text registro">{{registro}}</div>
  <div class="text seccion">{{seccion}}</div>
  <div class="text vigencia">{{vigencia}}</div>
</div>

<div class="back">
  <img src="back.png" class="base">

  <img src="{{qr}}" class="qr1">
  <img src="{{qr}}" class="qr2">
  <img src="{{qr}}" class="qr3">

  <img src="{{barcode}}" class="barcode">

  <div class="mrz">{{mrz}}</div>
</div>

</div>

</body>
</html>
