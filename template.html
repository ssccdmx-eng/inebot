<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  font-family: Arial;
  margin: 0;
}

.card {
  width: 800px;
  height: 500px;
  border: 2px solid #000;
  position: relative;
}

.foto {
  position: absolute;
  top: 100px;
  left: 50px;
  width: 180px;
}

.firma {
  position: absolute;
  bottom: 50px;
  left: 50px;
  width: 150px;
}

.qr {
  position: absolute;
  right: 50px;
  top: 100px;
  width: 120px;
}

.barcode {
  position: absolute;
  bottom: 50px;
  right: 50px;
  width: 200px;
}

.text {
  position: absolute;
  left: 260px;
  top: 100px;
}

</style>
</head>

<body>

<div class="card">

  <img class="foto" src="{{foto}}">
  <img class="firma" src="{{firma}}">
  <img class="qr" src="{{qr}}">
  <img class="barcode" src="{{barcode}}">

  <div class="text">
    <p><b>{{nombre}} {{paterno}} {{materno}}</b></p>
    <p>CURP: {{curp}}</p>
    <p>Sexo: {{sexo}}</p>
    <p>Nacimiento: {{fechaNacimiento}}</p>
    <p>Domicilio: {{domicilio}}</p>
    <p>Sección: {{seccion}}</p>
    <p>Registro: {{registro}}</p>
    <p>Vigencia: {{vigencia}}</p>
  </div>

</div>

</body>
</html>
