<!DOCTYPE html>
<html>
<head>
<style>

body {
  margin: 0;
  background: #f0f0f0;
  font-family: Arial, Helvetica, sans-serif;
}

/* contenedor general */
.page {
  width: 860px;
}

/* tarjeta */
.card {
  position: relative;
  width: 860px;
  height: 540px;
  margin-bottom: 20px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

/* fondo */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* foto principal */
.photo {
  position: absolute;
  top: 150px;
  left: 90px;
  width: 180px;
  height: 230px;
  object-fit: cover;
  border-radius: 8px;
}

/* mini foto */
.photo-mini {
  position: absolute;
  top: 140px;
  right: 70px;
  width: 80px;
  height: 100px;
  object-fit: cover;
  border-radius: 6px;
}

/* bloque de texto */
.text {
  position: absolute;
  top: 180px;
  left: 300px;
  width: 450px;
}

/* nombre */
.name {
  font-size: 22px;
  font-weight: bold;
  line-height: 1.2;
}

/* curp */
.curp {
  margin-top: 10px;
  font-size: 16px;
  letter-spacing: 1px;
}

/* watermark sutil */
.watermark {
  position: absolute;
  bottom: 20px;
  right: 20px;
  opacity: 0.05;
  font-size: 40px;
  font-weight: bold;
}

</style>
</head>

<body>

<div class="page">

  <!-- FRENTE -->
  <div class="card">

    <img src="front.png" class="bg">

    <img src="{{foto}}" class="photo">
    <img src="{{foto}}" class="photo-mini">

    <div class="text">
      <div class="name">
        {{nombre}}<br>
        {{paterno}}<br>
        {{materno}}
      </div>

      <div class="curp">
        {{curp}}
      </div>
    </div>

    <div class="watermark">ID</div>

  </div>

  <!-- REVERSO -->
  <div class="card">
    <img src="back.png" class="bg">
  </div>

</div>

</body>
</html>
